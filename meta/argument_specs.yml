---
argument_specs:
  main:
    short_description: Install vim, vundle, plugins, and customize .vimrc
    options:
      install:
        type: bool
        default: true
        description: Set to false to uninstall vim and remove its config
      vundle:
        type: list
        elements: str
        description: Vundle plugin sources rendered into the generated .vimrc
        default:
          - "The-NERD-tree"
          - "vim-flake8"
          - "surround.vim"
          - "vadv/vim-chef"
          - "vim-syntastic/syntastic"
          - "plasticboy/vim-markdown"
          - "mzlogin/vim-markdown-toc"
          - "ekalinin/Dockerfile.vim"
          - "https://github.com/hashivim/vim-terraform.git"
          - "https://github.com/wtfbbqhax/Snort-vim.git"
          - "https://github.com/pearofducks/ansible-vim.git"
          - "https://github.com/powerline/powerline.git"
          - "https://github.com/ngmy/vim-rubocop.git"
      set:
        type: list
        elements: str
        description: "`:set` options rendered into the generated .vimrc"
        default:
          - laststatus=2
          - showtabline=2
          - noshowmode
          - foldmethod=indent
          - foldlevel=99
          - background=dark
          - completeopt=menuone,longest,preview
          - colorcolumn=101
          - cursorcolumn
          - cursorline
          - expandtab
          - tabstop=2
          - shiftwidth=2
          - spell
          - spelllang=en
          - spellfile=$HOME/.config/vim/en.utf-8.add
          - number
          - statusline+=%#warningmsg#
          - statusline+=%{SyntasticStatuslineFlag()}
          - statusline+=%*
      map:
        type: list
        elements: str
        description: "`:map` bindings rendered into the generated .vimrc"
        default:
          - <c-j> <c-w>j
          - <c-k> <c-w>k
          - <c-l> <c-w>l
          - <c-h> <c-w>h
          - <leader>td <Plug>TaskLisk
          - "<leader>g :GundoToggle<CR>"
          - "<F2> :NERDTreeToggle<CR>"
          - "<F3> :setlocal spell! spelllang=en_us<CR>"
      nmap:
        type: list
        elements: str
        description: "`:nmap` bindings rendered into the generated .vimrc"
        default:
          - "<F4> :SyntasticToggleMode<CR>"
          - "<f5> :set number! number?<cr>"
      syntax:
        type: list
        elements: str
        description: "`:syntax` setting rendered into the generated .vimrc"
        default:
          - "on"
      colorscheme:
        type: list
        elements: str
        description: "`:colorscheme` setting rendered into the generated .vimrc"
        default:
          - slate
      filetype:
        type: list
        elements: str
        description: "`:filetype` settings rendered into the generated .vimrc"
        default:
          - "on"
          - plugin indent on
      let:
        type: list
        elements: str
        description: "`:let` variable assignments rendered into the generated .vimrc"
        default:
          - g:pyflakes_use_quickfix = 0
          - g:NERDTreeDirArrows=0
          - g:syntastic_always_populate_loc_list = 1
          - g:syntastic_auto_loc_list = 1
          - g:syntastic_check_on_open = 1
          - g:syntastic_check_on_wq = 0
          - g:syntastic_ruby_checkers = ['rubocop']
          - g:syntastic_python_checkers = ['pylint', 'flake8']
          - g:syntastic_ansible_checkers = ['ansible_lint']
          - g:syntastic_chef_checkers = ['cookstyle']
          - g:ansible_ftdetect_filename_regex = '\v(playbook|site|main|local|requirements)\.ya?ml$'
      command:
        type: list
        elements: str
        description: "`:command` definitions rendered into the generated .vimrc"
        default:
          - Fuckyou w !sudo tee %
      autocmd:
        type: list
        elements: str
        description: "`:autocmd` definitions rendered into the generated .vimrc"
        default:
          - FileType ruby,eruby set filetype=ruby.eruby.chef
