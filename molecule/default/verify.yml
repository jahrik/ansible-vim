---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check vim binary
      ansible.builtin.stat:
        path: /usr/bin/vim
      register: vim_bin

    - name: Assert vim is installed
      ansible.builtin.assert:
        that: vim_bin.stat.exists
        fail_msg: "vim binary not found at /usr/bin/vim"

    - name: Run vim --version
      ansible.builtin.command: vim --version
      register: vim_version
      changed_when: false

    - name: Assert vim version output
      ansible.builtin.assert:
        that: "'VIM - Vi IMproved' in vim_version.stdout"
        fail_msg: "vim --version did not produce expected output"

    - name: Check ~/.vimrc
      ansible.builtin.stat:
        path: ~/.vimrc
      register: vimrc

    - name: Assert ~/.vimrc exists
      ansible.builtin.assert:
        that: vimrc.stat.exists
        fail_msg: "~/.vimrc not found"

    - name: Verify vim can source ~/.vimrc without errors
      ansible.builtin.command: vim -u ~/.vimrc --noplugin -c 'qall!'
      register: vim_source
      changed_when: false
      failed_when: vim_source.rc != 0

    - name: Check vundle directory
      ansible.builtin.stat:
        path: ~/.config/vim/bundle/Vundle.vim
      register: vundle_dir

    - name: Assert vundle is installed
      ansible.builtin.assert:
        that: vundle_dir.stat.exists and vundle_dir.stat.isdir
        fail_msg: "~/.config/vim/bundle/Vundle.vim not found"

- name: Verify uninstall
  hosts: all
  gather_facts: true
  tasks:
    - name: Run jahrik.vim with install false
      ansible.builtin.include_role:
        name: jahrik.vim
      vars:
        install: false

    - name: Check vim binary removed
      ansible.builtin.stat:
        path: /usr/bin/vim
      register: vim_bin_removed

    - name: Assert vim binary is removed
      ansible.builtin.assert:
        that: not vim_bin_removed.stat.exists
        fail_msg: "vim binary still present at /usr/bin/vim after uninstall"

    - name: Check ~/.vimrc removed
      ansible.builtin.stat:
        path: ~/.vimrc
      register: vimrc_removed

    - name: Assert ~/.vimrc is removed
      ansible.builtin.assert:
        that: not vimrc_removed.stat.exists
        fail_msg: "~/.vimrc still present after uninstall"

    - name: Check ~/.config/vim directory removed
      ansible.builtin.stat:
        path: ~/.config/vim/
      register: vim_config_dir_removed

    - name: Assert ~/.config/vim directory is removed
      ansible.builtin.assert:
        that: not vim_config_dir_removed.stat.exists
        fail_msg: "~/.config/vim/ still present after uninstall"
